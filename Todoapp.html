<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All-in-One To-Do App</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 50px;
        }

        .todo-container {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #667eea; }

        button#add-btn {
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button#add-btn:hover { background-color: #5a6fd6; }

        ul { list-style: none; padding: 0; }

        li {
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-text { cursor: pointer; flex: 1; }

        .completed {
            text-decoration: line-through;
            color: #bbb;
        }

        .delete-btn {
            background: #ffeded;
            color: #ff5e5e;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn:hover { background: #ff5e5e; color: white; }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>My Tasks</h2>
        <div class="input-group">
            <input type="text" id="todo-input" placeholder="What's the plan?">
            <button id="add-btn">Add</button>
        </div>
        <ul id="todo-list"></ul>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        function addTask() {
            const taskText = input.value.trim();
            
            if (taskText === "") return;

            const li = document.createElement('li');
            li.innerHTML = `
                <span class="task-text">${taskText}</span>
                <button class="delete-btn">Delete</button>
            `;

            // Toggle completion
            li.querySelector('.task-text').addEventListener('click', function() {
                this.classList.toggle('completed');
            });

            // Delete task
            li.querySelector('.delete-btn').addEventListener('click', function() {
                li.style.opacity = '0';
                setTimeout(() => li.remove(), 200);
            });

            todoList.appendChild(li);
            input.value = "";
            input.focus();
        }

        addBtn.addEventListener('click', addTask);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
